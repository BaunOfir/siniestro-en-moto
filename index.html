<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cartas Editables</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#191919;
    font-family:Arial, Helvetica, sans-serif;
    color:white;
    padding:40px;
    overflow-x:hidden;
}

/* TABLERO */
.tablero{
    display:flex;
    flex-direction:column;
    gap:120px;
    align-items:center;
}

/* TITULO */
.titulo{
    text-align:center;
    font-size:42px;
    margin-bottom:40px;
}

/* MAZO */
.mazo{
    display:grid;
    grid-template-columns:repeat(5, 220px);
    gap:25px;
}

/* WRAPPER */
.carta-wrapper{
    perspective:1200px;
}

/* CARTA */
.carta{
    width:220px;
    height:320px;

    position:relative;

    transform-style:preserve-3d;

    transition:
        transform 0.7s ease,
        box-shadow 0.4s ease;

    cursor:pointer;
}

/* HOVER */
.carta:hover:not(.activa){

    transform:
        rotateY(360deg)
        scale(1.12);

    z-index:10;
}

/* CARTA ABIERTA */
.carta.activa{

    position:fixed;

    left:50%;
    top:50%;

    width:380px;
    height:550px;

    transform:
        translate(-50%, -50%);

    z-index:9999;

    animation:giro 0.8s ease;

    box-shadow:
        0 25px 70px rgba(0,0,0,0.8);
}

/* ANIMACION */
@keyframes giro{

    from{

        transform:
            translate(-50%, -50%)
            rotateY(0deg)
            scale(0.5);
    }

    to{

        transform:
            translate(-50%, -50%)
            rotateY(360deg)
            scale(1);
    }
}

/* FRENTE Y ATRAS */
.frente,
.atras{

    position:absolute;

    width:100%;
    height:100%;

    border-radius:18px;

    overflow:hidden;

    backface-visibility:hidden;

    box-shadow:
        0 15px 40px rgba(0,0,0,0.5);
}

/* IMAGEN */
.frente img{

    width:100%;
    height:100%;

    object-fit:cover;
}

/* ATRAS */
.atras{

    background:
        linear-gradient(
            135deg,
            #f33929,
            #f33929
        );

    transform:rotateY(180deg);

    display:flex;
    justify-content:center;
    align-items:center;

    font-size:30px;
    font-weight:bold;
}

/* NOMBRE */
.nombre{

    position:absolute;

    bottom:0;

    width:100%;

    padding:14px;

    text-align:center;

    font-size:22px;
    font-weight:bold;

    background:
        linear-gradient(
            transparent,
            rgba(0,0,0,0.9)
        );
}

/* OVERLAY */
.overlay{

    position:fixed;

    inset:0;

    background:rgba(0,0,0,0.75);

    opacity:0;

    pointer-events:none;

    transition:0.3s;

    z-index:9990;
}

.overlay.visible{

    opacity:1;

    pointer-events:all;
}

</style>
</head>

<body>

<div class="overlay" id="overlay"></div>

<div class="tablero">

    <!-- MAZO 1 -->
    <div>

        <div class="titulo">MAZO ACUSADOR</div>

        <div class="mazo" id="mazo1"></div>

    </div>

    <!-- MAZO 2 -->
    <div>

        <div class="titulo">MAZO DEFENSOR</div>

        <div class="mazo" id="mazo2"></div>

    </div>

</div>

<script>

/* ======================================
   CARTAS DEL MAZO 1
====================================== */

const mazo1Cartas = [

{

    imagen: "cartas/acusador/equipo/casco.jpeg"
},

{

},

{
    nombre: "Mago",
    imagen: "img/mago.jpg"
},

{
    nombre: "Lobo",
    imagen: "img/lobo.jpg"
},

{
    nombre: "Fuego",
    imagen: "img/fuego.jpg"
},

{
    nombre: "Hielo",
    imagen: "img/hielo.jpg"
},

{
    nombre: "Bosque",
    imagen: "img/bosque.jpg"
},

{
    nombre: "Rayo",
    imagen: "img/rayo.jpg"
},

{
    nombre: "Océano",
    imagen: "img/oceano.jpg"
},

{
    nombre: "Sombra",
    imagen: "img/sombra.jpg"
},

{
    nombre: "Ángel",
    imagen: "img/angel.jpg"
},

{
    nombre: "Demonio",
    imagen: "img/demonio.jpg"
},

{
    nombre: "Titán",
    imagen: "img/titan.jpg"
},

{
    nombre: "Bestia",
    imagen: "img/bestia.jpg"
},

{
    nombre: "Rey",
    imagen: "img/rey.jpg"
}

];


/* ======================================
   CARTAS DEL MAZO 2
====================================== */

const mazo2Cartas = [

{
    nombre: "Samurai",
    imagen: "img/samurai.jpg"
},

{
    nombre: "Bruja",
    imagen: "img/bruja.jpg"
},

{
    nombre: "Fantasma",
    imagen: "img/fantasma.jpg"
},

{
    nombre: "Caballero",
    imagen: "img/caballero.jpg"
},

{
    nombre: "Volcán",
    imagen: "img/volcan.jpg"
},

{
    nombre: "Tornado",
    imagen: "img/tornado.jpg"
},

{
    nombre: "Veneno",
    imagen: "img/veneno.jpg"
},

{
    nombre: "Robot",
    imagen: "img/robot.jpg"
},

{
    nombre: "Alien",
    imagen: "img/alien.jpg"
},

{
    nombre: "Pirata",
    imagen: "img/pirata.jpg"
},

{
    nombre: "Ninja",
    imagen: "img/ninja.jpg"
},

{

    imagen: "img/leon.jpg"
},

    nombre: "Tigre",
    imagen: "img/tigre.jpg"
},

{
    nombre: "Kraken",
    imagen: "img/kraken.jpg"
},

{
    nombre: "Fénix",
    imagen: "img/fenix.jpg"
}

];


/* ======================================
   OVERLAY
====================================== */

const overlay = document.getElementById("overlay");


/* ======================================
   CERRAR CARTAS
====================================== */

function cerrarCartas(){

    document.querySelectorAll(".carta").forEach(c => {

        c.classList.remove("activa");

    });

    overlay.classList.remove("visible");
}

overlay.addEventListener("click", cerrarCartas);


/* ======================================
   CREAR MAZO
====================================== */

function crearMazo(id, cartas){

    const mazo = document.getElementById(id);

    cartas.forEach(dato => {

        const wrapper = document.createElement("div");

        wrapper.classList.add("carta-wrapper");

        const carta = document.createElement("div");

        carta.classList.add("carta");

        carta.innerHTML = `

            <div class="frente">

                <img src="${dato.imagen}">

                <div class="nombre">
                    ${dato.nombre}
                </div>

            </div>

            <div class="atras">
                ${dato.nombre}
            </div>

        `;

        /* CLICK */
        carta.addEventListener("click", (e) => {

            e.stopPropagation();

            const abierta =
                carta.classList.contains("activa");

            cerrarCartas();

            if(!abierta){

                carta.classList.add("activa");

                overlay.classList.add("visible");
            }
        });

        wrapper.appendChild(carta);

        mazo.appendChild(wrapper);
    });
}


/* ======================================
   CREAR LOS DOS MAZOS
====================================== */

crearMazo("mazo1", mazo1Cartas);

crearMazo("mazo2", mazo2Cartas);

</script>

</body>
</html>
